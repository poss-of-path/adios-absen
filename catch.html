<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Adiosection — Day 4: Catch the Icon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="catch.css">
</head>
<body>

<div class="page catch-page">

  <div class="logo-wrap">
    <img src="assets/logo.png" alt="Adiosection logo">
  </div>

  <div class="game-header">
    <div class="game-title">TANGKAP ICON!</div>
    <div class="game-subtitle">Geser keranjang ke kiri &amp; kanan untuk menangkap semua icon yang jatuh. Satu saja lolos, permainan selesai!</div>
  </div>

  <div class="score-row">
    <div class="score-pill"><span class="score-label">SKOR</span><span id="scoreValue">0</span></div>
    <div class="score-pill best-pill"><span class="score-label">TERBAIK</span><span id="bestValue">0</span></div>
  </div>

  <div class="stage-wrap">
    <div class="stage" id="stage">
      <div class="basket" id="basket">
        <img src="assets/Keranjang.png" alt="Keranjang">
      </div>
    </div>
  </div>

 
</div>

<!-- Start / countdown overlay -->
<div class="modal-backdrop open" id="startModal">
  <div class="modal-box">
    <img src="assets/icon4.png" alt="">
    <p id="startMessage">Bersiap menangkap icon!</p>
    <button onclick="startGame()">Mulai</button>
  </div>
</div>

<!-- Game over popup -->
<div class="modal-backdrop" id="overModal">
  <div class="modal-box">
    <img src="assets/icon4.png" alt="">
    <p id="overMessage">Game Over!</p>
    <div class="final-score" id="finalScore">Skor akhir: 0</div>
    <div class="modal-btn-row">
      <button class="secondary-btn" onclick="window.location.href='index.html'">Beranda</button>
      <button onclick="resetGame()">Coba Lagi</button>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const playerName = params.get('name') || 'Friend';
const dayNumber = params.get('day') || '4';

document.getElementById('startMessage').textContent =
  `Halo, ${playerName}! Tangkap semua icon yang jatuh pakai keranjang. Setiap tangkapan +10 poin — jangan sampai ada yang lolos!`;

document.querySelectorAll('.modal-box img').forEach(img => {
  img.addEventListener('error', function(){
    const fallback = document.createElement('div');
    fallback.textContent = '⭐';
    fallback.style.fontSize = '56px';
    fallback.style.lineHeight = '1';
    fallback.style.margin = '0 auto 14px';
    this.replaceWith(fallback);
  });
});

const ICONS = ['assets/icon1.png','assets/icon2.png','assets/icon3.png','assets/icon4.png','assets/icon5.png'];
const BEST_KEY = 'adiosection_day4_best';

const stage = document.getElementById('stage');
const basketEl = document.getElementById('basket');
const scoreValueEl = document.getElementById('scoreValue');
const bestValueEl = document.getElementById('bestValue');

let stageW = 0, stageH = 0, basketW = 0, basketH = 0;
let basketX = 0; // left position of basket
let score = 0;
let running = false;
let rafId = null;
let lastTime = 0;
let elapsed = 0;

// difficulty tuning
const BASE_SPEED = 90;      // px/sec at game start
const MAX_SPEED = 420;      // px/sec speed cap
const SPEED_RAMP_TIME = 45; // seconds to go from BASE_SPEED to MAX_SPEED
const BASE_SPAWN_MS = 1350;
const MIN_SPAWN_MS = 520;

let fallingItems = [];
let nextSpawnAt = 0;

let bestScore = 0;
try { bestScore = parseInt(localStorage.getItem(BEST_KEY) || '0', 10) || 0; } catch(e){ bestScore = 0; }
bestValueEl.textContent = bestScore;

function currentSpeed(){
  const t = Math.min(elapsed / SPEED_RAMP_TIME, 1);
  // ease-in so the speed-up feels gradual at first, then noticeably faster
  const eased = t * t * (3 - 2 * t);
  return BASE_SPEED + (MAX_SPEED - BASE_SPEED) * eased;
}

function currentSpawnInterval(){
  const t = Math.min(elapsed / SPEED_RAMP_TIME, 1);
  return BASE_SPAWN_MS - (BASE_SPAWN_MS - MIN_SPAWN_MS) * t;
}

function measure(){
  stageW = stage.clientWidth;
  stageH = stage.clientHeight;
  basketW = basketEl.offsetWidth;
  basketH = basketEl.offsetHeight;
  basketX = Math.min(Math.max(basketX, 0), stageW - basketW);
  basketEl.style.left = basketX + 'px';
}

function setBasketCenterX(cx){
  basketX = cx - basketW / 2;
  basketX = Math.max(0, Math.min(stageW - basketW, basketX));
  basketEl.style.left = basketX + 'px';
}

// ---- pointer / touch drag control ----
// The basket follows the pointer's x position whenever it's over the stage —
// this covers a finger-drag on touch devices and a plain mouse-follow on
// desktop, without forcing the player to hold a button down.
function handlePointer(e){
  if(!running) return;
  const rect = stage.getBoundingClientRect();
  setBasketCenterX(e.clientX - rect.left);
}
stage.addEventListener('pointerdown', handlePointer);
stage.addEventListener('pointermove', handlePointer);

// ---- keyboard control (desktop) ----
const keys = { left: false, right: false };
window.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowLeft') keys.left = true;
  if(e.key === 'ArrowRight') keys.right = true;
});
window.addEventListener('keyup', (e) => {
  if(e.key === 'ArrowLeft') keys.left = false;
  if(e.key === 'ArrowRight') keys.right = false;
});

function spawnItem(){
  const size = Math.max(46, Math.min(64, stageW * 0.14));
  const src = ICONS[Math.floor(Math.random() * ICONS.length)];
  const x = Math.random() * (stageW - size);

  const el = document.createElement('img');
  el.src = src;
  el.className = 'falling-icon';
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.left = x + 'px';
  el.style.top = -size + 'px';
  stage.appendChild(el);

  fallingItems.push({ el, x, y: -size, size, caught: false });
}

function catchEffect(item){
  item.el.classList.add('caught');
  setTimeout(() => item.el.remove(), 260);
}

function endGame(){
  running = false;
  cancelAnimationFrame(rafId);

  fallingItems.forEach(it => it.el.remove());
  fallingItems = [];

  if(score > bestScore){
    bestScore = score;
    try { localStorage.setItem(BEST_KEY, String(bestScore)); } catch(e){}
  }
  bestValueEl.textContent = bestScore;

  document.getElementById('overMessage').textContent = `Yah, ada icon yang lolos, ${playerName}!`;
  document.getElementById('finalScore').textContent = `Skor akhir: ${score}`;
  document.getElementById('overModal').classList.add('open');
}

function tick(now){
  if(!running) return;
  if(!lastTime) lastTime = now;
  const dt = Math.min((now - lastTime) / 1000, 0.05); // clamp for tab-switch jumps
  lastTime = now;
  elapsed += dt;

  // keyboard movement
  const kbSpeed = 480; // px/sec
  if(keys.left) setBasketCenterX(basketX + basketW/2 - kbSpeed * dt);
  if(keys.right) setBasketCenterX(basketX + basketW/2 + kbSpeed * dt);

  // spawn
  if(now >= nextSpawnAt){
    spawnItem();
    nextSpawnAt = now + currentSpawnInterval();
  }

  const speed = currentSpeed();
  const basketTop = stageH - basketH * 0.62; // catch zone starts a bit before the visual top of the basket
  const basketLeft = basketX + basketW * 0.12;
  const basketRight = basketX + basketW * 0.88;

  for(let i = fallingItems.length - 1; i >= 0; i--){
    const item = fallingItems[i];
    if(item.caught) continue;
    item.y += speed * dt;
    item.el.style.top = item.y + 'px';

    const itemBottom = item.y + item.size;
    const itemCenterX = item.x + item.size / 2;

    if(itemBottom >= basketTop){
      const overlaps = itemCenterX >= basketLeft && itemCenterX <= basketRight;
      if(overlaps){
        item.caught = true;
        score += 10;
        scoreValueEl.textContent = score;
        catchEffect(item);
        fallingItems.splice(i, 1);
      } else if(item.y > stageH){
        // missed the basket entirely — game over
        fallingItems.splice(i, 1);
        item.el.remove();
        endGame();
        return;
      }
    }
  }

  rafId = requestAnimationFrame(tick);
}

function startGame(){
  document.getElementById('startModal').classList.remove('open');
  measure();
  score = 0;
  elapsed = 0;
  scoreValueEl.textContent = 0;
  fallingItems.forEach(it => it.el.remove());
  fallingItems = [];
  running = true;
  lastTime = 0;
  nextSpawnAt = performance.now() + 400;
  rafId = requestAnimationFrame(tick);
}

function resetGame(){
  document.getElementById('overModal').classList.remove('open');
  startGame();
}

window.addEventListener('resize', measure);
measure();
setBasketCenterX(stageW / 2);
</script>

</body>
</html>
